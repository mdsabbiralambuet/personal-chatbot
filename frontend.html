<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ask Sabbir's Bot</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1d23;
    --text: #e6e6e6;
    --muted: #8a8f98;
    --accent: #6aa9ff;
    --user-bubble: #2a3340;
    --bot-bubble: #1f2329;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; max-width: 720px; padding: 24px 16px 8px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

  #chat {
    width: 100%; max-width: 720px; flex: 1;
    padding: 16px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg {
    padding: 10px 14px; border-radius: 12px;
    max-width: 85%; line-height: 1.5; white-space: pre-wrap;
    word-wrap: break-word;
  }
  .user { align-self: flex-end; background: var(--user-bubble); }
  .bot  { align-self: flex-start; background: var(--bot-bubble); }
  .bot.thinking { color: var(--muted); font-style: italic; }

  #composer {
    width: 100%; max-width: 720px;
    display: flex; gap: 8px; padding: 12px 16px 20px;
    background: var(--bg);
  }
  #input {
    flex: 1; padding: 12px 14px; border-radius: 10px;
    border: 1px solid #2a2f37; background: var(--panel);
    color: var(--text); font-size: 14px; outline: none;
  }
  #input:focus { border-color: var(--accent); }
  #send {
    padding: 0 18px; border-radius: 10px; border: none;
    background: var(--accent); color: #0a0c10; font-weight: 600;
    cursor: pointer;
  }
  #send:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
  <header>
    <h1>Ask about Sabbir</h1>
    <p>A chatbot that knows my research, projects, and interests.</p>
  </header>

  <div id="chat"></div>

  <div id="composer">
    <input id="input" type="text" placeholder="Ask me anything about Sabbir..." autocomplete="off" />
    <button id="send">Send</button>
  </div>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const send = document.getElementById("send");

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function ask(question) {
    addMessage("user", question);
    const botDiv = addMessage("bot thinking", "thinking...");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: question }),
      });

      if (!res.ok) throw new Error("Server error: " + res.status);

      botDiv.className = "msg bot";
      botDiv.textContent = "";

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        botDiv.textContent += decoder.decode(value, { stream: true });
        chat.scrollTop = chat.scrollHeight;
      }
    } catch (err) {
      botDiv.className = "msg bot";
      botDiv.textContent = "Error: " + err.message;
    }
  }

  function submit() {
    const q = input.value.trim();
    if (!q) return;
    input.value = "";
    send.disabled = true;
    ask(q).finally(() => {
      send.disabled = false;
      input.focus();
    });
  }

  send.addEventListener("click", submit);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
  });
  input.focus();
</script>
</body>
</html>
